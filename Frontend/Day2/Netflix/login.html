<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netflix Login</title>
    <link rel="stylesheet" href="login.css">
</head>
<body>

<nav>
    <a href="Net.html"><img src="net.png" alt="Netflix Logo"></a>
</nav>

<div class="container">

   
    <div class="image">
        <img src="net2.png" alt="Netflix">
    </div>

    <div class="form">

        <h1>Sign In</h1>

        <form action="Net.html">

            <input type="email" placeholder="Email or mobile number" required>

            <input type="password" placeholder="Password" required>

            <button class="login-btn" type="submit">Sign In</button>

            <p class="or">OR</p>

            <button class="code-btn" type="button">Use a sign-in code</button>

            <a href="#">Forgot Password?</a>

            <label class="remember">
                <input type="checkbox">
                Remember Me
            </label>

            <p class="signup">
                New to Netflix?
                <a href="#">Sign up now.</a>
            </p>

            <p class="captcha">
                This page is protected by Google reCAPTCHA to ensure you're not a bot.
            </p>

        </form>

    </div>

</div>

</body>
</html>
